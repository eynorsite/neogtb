# =============================================================================
# NeoGTB — vhost nginx unifié (Laravel/Filament 12)
# =============================================================================
# Date de génération : 2026-04-07
# Origine            : audit migration NeoGTB (Astro statique + ancien Laravel)
#                      → cible unique Laravel/Filament 12 servant le site public
#                      (Blade) ET le back-office Filament (/admin).
#
# Note : Adapter root si renommage final → /var/www/neogtb-laravel/admin/public
#
# Activation :
#   sudo cp nginx-neogtb-laravel.conf /etc/nginx/sites-available/neogtb \
#     && sudo ln -sf /etc/nginx/sites-available/neogtb /etc/nginx/sites-enabled/neogtb \
#     && sudo nginx -t \
#     && sudo systemctl reload nginx
# =============================================================================


# -----------------------------------------------------------------------------
# 1) HTTP → HTTPS — domaines publics (neogtb.fr, www, .com, www.com)
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name neogtb.fr www.neogtb.fr neogtb.com www.neogtb.com;

    # ACME challenge Let's Encrypt (renouvellement certbot)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
    }

    location / {
        return 301 https://neogtb.fr$request_uri;
    }
}


# -----------------------------------------------------------------------------
# 2) HTTP → HTTPS — back-office (admin.neogtb.fr)
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name admin.neogtb.fr;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
    }

    location / {
        return 301 https://admin.neogtb.fr$request_uri;
    }
}


# -----------------------------------------------------------------------------
# 3) HTTPS — site public Laravel (canonique : neogtb.fr)
# -----------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name neogtb.fr www.neogtb.fr neogtb.com www.neogtb.com;

    # --- Redirection canonique vers https://neogtb.fr -----------------------
    # Toute requête sur www.neogtb.fr / neogtb.com / www.neogtb.com → neogtb.fr
    if ($host != "neogtb.fr") {
        return 301 https://neogtb.fr$request_uri;
    }

    # --- Racine Laravel (public/) -------------------------------------------
    root /var/www/neogtb-laravel-new/admin/public;
    index index.php index.html;

    charset utf-8;

    # --- SSL Let's Encrypt --------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/neogtb.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/neogtb.fr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Headers de sécurité ------------------------------------------------
    add_header X-Content-Type-Options        "nosniff"                                      always;
    add_header X-Frame-Options               "DENY"                                         always;
    add_header Strict-Transport-Security     "max-age=31536000; includeSubDomains"          always;
    add_header Referrer-Policy               "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy            "camera=(), microphone=(), geolocation=()"     always;
    add_header X-XSS-Protection              "1; mode=block"                                always;

    # --- Logs dédiés --------------------------------------------------------
    access_log /var/log/nginx/neogtb.fr.access.log;
    error_log  /var/log/nginx/neogtb.fr.error.log warn;

    # --- Tailles & timeouts -------------------------------------------------
    client_max_body_size 32M;

    # --- Routing Laravel ----------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # --- Cache long des assets statiques (build Vite, images, fonts…) ------
    location ~* ^/(storage|css|js|images|fonts|build)/ {
        try_files $uri =404;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # --- Assets racine (favicon, robots…) -----------------------------------
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # --- Exécution PHP via PHP-FPM 8.4 --------------------------------------
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        include fastcgi_params;

        fastcgi_read_timeout 120;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # --- Sécurité : fichiers cachés (.git, .htaccess, .env, …) --------------
    location ~ /\. {
        deny all;
        return 404;
    }

    # --- Sécurité : blocage accès direct aux répertoires sensibles ---------
    location ~ ^/(storage/framework|storage/logs|vendor)(/|$) {
        deny all;
        return 404;
    }
    location = /.env {
        deny all;
        return 404;
    }
}


# -----------------------------------------------------------------------------
# 4) HTTPS — back-office Filament (admin.neogtb.fr)
# -----------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.neogtb.fr;

    # --- Racine Laravel (même codebase que le public) -----------------------
    root /var/www/neogtb-laravel-new/admin/public;
    index index.php index.html;

    charset utf-8;

    # --- SSL Let's Encrypt --------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/admin.neogtb.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.neogtb.fr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Headers de sécurité (plus stricts que le public) -------------------
    # SAMEORIGIN pour autoriser les iframes internes Filament (previews, etc.)
    add_header X-Content-Type-Options        "nosniff"                                      always;
    add_header X-Frame-Options               "SAMEORIGIN"                                   always;
    add_header Strict-Transport-Security     "max-age=31536000; includeSubDomains"          always;
    add_header Referrer-Policy               "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy            "camera=(), microphone=(), geolocation=()"     always;
    add_header X-XSS-Protection              "1; mode=block"                                always;

    # --- Logs dédiés --------------------------------------------------------
    access_log /var/log/nginx/admin.neogtb.fr.access.log;
    error_log  /var/log/nginx/admin.neogtb.fr.error.log warn;

    # --- Uploads back-office (imports, médias) ------------------------------
    client_max_body_size 64M;

    # --- Routing Laravel ----------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # --- Cache long des assets statiques ------------------------------------
    location ~* ^/(storage|css|js|images|fonts|build)/ {
        try_files $uri =404;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # --- Exécution PHP via PHP-FPM 8.4 --------------------------------------
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        include fastcgi_params;

        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # --- Sécurité : fichiers cachés -----------------------------------------
    location ~ /\. {
        deny all;
        return 404;
    }

    # --- Sécurité : blocage accès direct aux répertoires sensibles ---------
    location ~ ^/(storage/framework|storage/logs|vendor)(/|$) {
        deny all;
        return 404;
    }
    location = /.env {
        deny all;
        return 404;
    }
}
