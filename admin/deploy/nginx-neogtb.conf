# /etc/nginx/sites-enabled/neogtb
# NeoGTB — Laravel + Filament (apex/www + admin)
# Hardening sécurité : HSTS, CSP, COOP/CORP, security.txt, blocs 404 propres
# Audit : 2026-05-04

# ============================================================
# www.neogtb.fr / neogtb.fr
# ============================================================
server {
    server_name neogtb.fr www.neogtb.fr;

    root /var/www/neogtb/current/admin/public;
    index index.php index.html;
    charset utf-8;
    client_max_body_size 20M;

    # --- security.txt ---
    location = /.well-known/security.txt {
        default_type text/plain;
        return 200 "Contact: mailto:security@neogtb.fr\nExpires: 2027-05-04T00:00:00.000Z\nPreferred-Languages: fr, en\nCanonical: https://www.neogtb.fr/.well-known/security.txt\n";
    }

    # --- Headers sécurité ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.bunny.net; font-src 'self' https://fonts.gstatic.com https://fonts.bunny.net data:; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss text/javascript image/svg+xml;

    location ~* \.(webp|jpg|jpeg|png|gif|ico|css|js|woff2?|svg|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; try_files $uri /index.php?$query_string; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS $https if_not_empty;
        fastcgi_read_timeout 60s;
    }

    location ~ /\.(?!well-known) {
        access_log off;
        log_not_found off;
        return 404;
    }

    location ~* \.(env|log|sql|sqlite|md|lock|yaml|yml|ini|conf|bak|old|tmp)$ {
        access_log off;
        log_not_found off;
        return 404;
    }

    location ~ ^/(storage|bootstrap|database|app|config|resources|routes|tests|vendor|node_modules)/ {
        return 404;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl;                  # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/neogtb.fr-0001/fullchain.pem;     # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/neogtb.fr-0001/privkey.pem;   # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;                         # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;                           # managed by Certbot
}

server {
    if ($host = www.neogtb.fr) { return 301 https://$host$request_uri; } # managed by Certbot
    if ($host = neogtb.fr)     { return 301 https://$host$request_uri; } # managed by Certbot
    listen 80;
    listen [::]:80;
    server_name neogtb.fr www.neogtb.fr;
    return 404; # managed by Certbot
}

# ============================================================
# admin.neogtb.fr — back-office Filament
# ============================================================
server {
    server_name admin.neogtb.fr;

    root /var/www/neogtb/current/admin/public;
    index index.php;
    charset utf-8;
    client_max_body_size 64M;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.bunny.net; font-src 'self' https://fonts.gstatic.com https://fonts.bunny.net data:; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    server_tokens off;

    gzip on;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    location ~* \.(webp|jpg|jpeg|png|gif|ico|css|js|woff2?|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / { try_files $uri $uri/ /index.php?$query_string; }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\.(?!well-known) {
        access_log off;
        log_not_found off;
        return 404;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/admin.neogtb.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.neogtb.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = admin.neogtb.fr) { return 301 https://$host$request_uri; }
    listen 80;
    listen [::]:80;
    server_name admin.neogtb.fr;
    return 404;
}
